<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- KDE-style installer icon: teal circle + down arrow into disk -->
  <circle cx="128" cy="128" r="120" fill="#00D2B4" opacity="0.15"/>
  <circle cx="128" cy="128" r="120" fill="none" stroke="#00D2B4" stroke-width="8"/>
  <!-- disk base -->
  <rect x="48" y="180" width="160" height="28" rx="8" fill="#00D2B4"/>
  <!-- down arrow -->
  <polygon points="128,60 168,130 148,130 148,165 108,165 108,130 88,130" fill="#00D2B4"/>
  <!-- KDE gear accent -->
  <circle cx="200" cy="60" r="22" fill="none" stroke="#FFD166" stroke-width="6"/>
  <circle cx="200" cy="60" r="8" fill="#FFD166"/>
</svg>
